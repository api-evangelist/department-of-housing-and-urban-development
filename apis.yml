aid: department-of-housing-and-urban-development
name: Department of Housing and Urban Development
description: >-
  The U.S. Department of Housing and Urban Development (HUD) is the federal
  agency responsible for overseeing programs that address the country's
  housing needs and promote sustainable urban development. HUD exposes
  programmatic data through the HUD USER FMR/IL API for Fair Market Rents and
  Income Limits, the HUD eGIS storefront and ArcGIS REST services for
  geospatial assets, the data.hud.gov data catalog, and various FHA tools
  including mortgage limits and condominium lookup services.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
